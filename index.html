<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nya | Songwriter Portfolio</title>
  <meta name="description" content="Nya is an independent songwriter creating original music for K-pop artists, global pop acts, games, and entertainment." />

  <link rel="preconnect" href="https:

  if(particles && !particles.children.length){
    const count = window.innerWidth < 850 ? 20 : 48;
    for(let i=0;i<count;i+=1){
      const p = document.createElement('span');
      p.style.setProperty('--left', `${Math.random()*100}%`);
      p.style.setProperty('--size', `${1 + Math.random()*3}px`);
      p.style.setProperty('--color', Math.random()>.72 ? '#73efff' : '#ff54cf');
      p.style.setProperty('--dur', `${8 + Math.random()*14}s`);
      p.style.setProperty('--delay', `${-Math.random()*18}s`);
      p.style.setProperty('--drift', `${-50 + Math.random()*100}px`);
      particles.appendChild(p);
    }
  }

  // Boot sequence
  window.addEventListener('load',()=>{
    setTimeout(()=>boot?.classList.add('done'),1300);
  });

  // Glitch all interactive UI on click
  document.querySelectorAll('a,button,.small-card,.video-feature').forEach(el=>{
    el.addEventListener('click',()=>{
      el.classList.remove('v2-click-glitch');
      void el.offsetWidth;
      el.classList.add('v2-click-glitch');
      setTimeout(()=>el.classList.remove('v2-click-glitch'),180);
    });
  });

  // Neon cursor on desktop
  if(window.matchMedia('(pointer:fine)').matches && cursor && cursorDot){
    document.body.classList.add('v2-pointer-ready');
    document.addEventListener('mousemove',e=>{
      cursor.style.left = `${e.clientX}px`;
      cursor.style.top = `${e.clientY}px`;
      cursorDot.style.left = `${e.clientX}px`;
      cursorDot.style.top = `${e.clientY}px`;
    });
    document.addEventListener('mousedown',()=>document.body.classList.add('v2-pointer-active'));
    document.addEventListener('mouseup',()=>document.body.classList.remove('v2-pointer-active'));
  }

  // Tiny UI sound generated in-browser; starts only after user interaction.
  let audioCtx;
  function uiBeep(freq=520,duration=.035,volume=.018){
    try{
      audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime+duration);
    }catch(_){}
  }

  document.querySelectorAll('a,button,.listen,.small-card').forEach(el=>{
    el.addEventListener('mouseenter',()=>uiBeep(620,.022,.008));
    el.addEventListener('click',()=>uiBeep(320,.055,.015));
  });
})();


// =========================================================
// NYA HOLOGRAPHIC CYBERPUNK V3
// =========================================================
(function(){
  const rain = null;
  const particles = document.getElementById('megaParticles');
  const traffic = document.getElementById('megaTraffic');
  const boot = document.getElementById('megaBoot');
  const cursor = document.getElementById('buttonCursor');

  const tokens = ['0101','1010','NYA','AUDIO','CORE','SYNC','SYS','NODE','PLAY','<>','//','MUSIC'];

  if(rain && !rain.children.length){
    const columns = window.innerWidth < 850 ? 14 : 34;
    for(let i=0;i<columns;i++){
      const col = document.createElement('span');
      col.className = `rain-column${Math.random()>.66 ? ' pink' : ''}`;
      col.style.left = `${Math.random()*100}%`;
      col.style.setProperty('--speed',`${7+Math.random()*15}s`);
      col.style.setProperty('--delay',`${-Math.random()*18}s`);
      col.textContent = Array.from({length:18},()=>tokens[Math.floor(Math.random()*tokens.length)]).join('\n');
      rain.appendChild(col);
    }
  }

  if(particles && !particles.children.length){
    const count = window.innerWidth < 850 ? 24 : 70;
    for(let i=0;i<count;i++){
      const p = document.createElement('span');
      p.style.setProperty('--left',`${Math.random()*100}%`);
      p.style.setProperty('--size',`${1+Math.random()*3}px`);
      p.style.setProperty('--color',Math.random()>.48 ? '#ff37c4' : '#39ff88');
      p.style.setProperty('--speed',`${7+Math.random()*15}s`);
      p.style.setProperty('--delay',`${-Math.random()*18}s`);
      p.style.setProperty('--drift',`${-70+Math.random()*140}px`);
      particles.appendChild(p);
    }
  }

  if(traffic && !traffic.children.length){
    const count = window.innerWidth < 850 ? 8 : 22;
    for(let i=0;i<count;i++){
      const t = document.createElement('span');
      t.className = `traffic-light${Math.random()>.55 ? ' pink' : ''}`;
      t.style.top = `${28+Math.random()*52}%`;
      t.style.setProperty('--speed',`${5+Math.random()*10}s`);
      t.style.setProperty('--delay',`${-Math.random()*12}s`);
      traffic.appendChild(t);
    }
  }

  // exactly 3 seconds, then remove the boot layer completely
  window.addEventListener('load',()=>{
    setTimeout(()=>{
      boot?.classList.add('done');
      setTimeout(()=>boot?.remove(),650);
    },3000);
  });

  // True sliced glitch, no shake.
  const glitchTargets = document.querySelectorAll(
    '.btn,.listen,.control-btn,.small-card,.about-box,.contact-card,.video-layout,.navlinks a,.pink-bot'
  );
  glitchTargets.forEach(el=>{
    el.addEventListener('click',()=>{
      el.classList.remove('is-glitching');
      void el.offsetWidth;
      el.classList.add('is-glitching');
      setTimeout(()=>el.classList.remove('is-glitching'),380);
    });
  });

  // Mouse hidden globally; show custom cursor only while over clickable UI.
  if(window.matchMedia('(pointer:fine)').matches && cursor){
    document.addEventListener('mousemove',e=>{
      cursor.style.left = `${e.clientX}px`;
      cursor.style.top = `${e.clientY}px`;
    });

    const interactive = document.querySelectorAll(
      'a,button,input,video,.small-card,.video-feature,.tag,.timeline,.volume'
    );

    interactive.forEach(el=>{
      el.addEventListener('mouseenter',()=>cursor.classList.add('show'));
      el.addEventListener('mouseleave',()=>cursor.classList.remove('show'));
    });

    document.addEventListener('mousedown',()=>cursor.classList.add('click'));
    document.addEventListener('mouseup',()=>cursor.classList.remove('click'));
  }
})();


// =========================================================
// V4 REAL RAIN + BUTTON-ONLY RETICLE
// =========================================================
(function(){
  const cursor = document.getElementById('buttonCursor');

  function buildRain(containerId, count, speedRange, heightRange, widthRange, opacityRange, driftRange){
    const container = document.getElementById(containerId);
    if(!container || container.children.length) return;

    for(let i=0;i<count;i++){
      const drop = document.createElement('span');
      drop.className = 'drop';

      const speed = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
      const height = heightRange[0] + Math.random() * (heightRange[1] - heightRange[0]);
      const width = widthRange[0] + Math.random() * (widthRange[1] - widthRange[0]);
      const opacity = opacityRange[0] + Math.random() * (opacityRange[1] - opacityRange[0]);
      const drift = driftRange[0] + Math.random() * (driftRange[1] - driftRange[0]);

      drop.style.setProperty('--x', `${Math.random() * 110 - 5}%`);
      drop.style.setProperty('--speed', `${speed}s`);
      drop.style.setProperty('--delay', `${-Math.random() * 8}s`);
      drop.style.setProperty('--h', `${height}px`);
      drop.style.setProperty('--w', `${width}px`);
      drop.style.setProperty('--o', opacity.toFixed(2));
      drop.style.setProperty('--drift', `${drift}px`);

      container.appendChild(drop);
    }
  }

  const mobile = window.innerWidth < 850;

  buildRain(
    'rainBack',
    mobile ? 55 : 150,
    [1.7, 2.7],
    [18, 36],
    [.5, 1],
    [.14, .34],
    [18, 40]
  );

  buildRain(
    'rainMid',
    mobile ? 38 : 100,
    [1.05, 1.75],
    [28, 58],
    [.7, 1.25],
    [.20, .46],
    [24, 54]
  );

  buildRain(
    'rainFront',
    mobile ? 0 : 58,
    [.65, 1.05],
    [48, 92],
    [1, 1.8],
    [.26, .58],
    [34, 72]
  );

  if(cursor && window.matchMedia('(pointer:fine)').matches){
    document.addEventListener('mousemove', event => {
      cursor.style.left = `${event.clientX}px`;
      cursor.style.top = `${event.clientY}px`;
    });

    const interactiveSelector = [
      'a',
      'button',
      'input',
      'textarea',
      'select',
      'video',
      '.btn',
      '.listen',
      '.control-btn',
      '.small-card',
      '.video-feature',
      '.pink-bot',
      '.timeline',
      '.volume'
    ].join(',');

    document.querySelectorAll(interactiveSelector).forEach(element => {
      element.addEventListener('mouseenter', () => cursor.classList.add('show'));
      element.addEventListener('mouseleave', () => {
        cursor.classList.remove('show');
        cursor.classList.remove('click');
      });

      element.addEventListener('mousedown', () => cursor.classList.add('click'));
      element.addEventListener('mouseup', () => cursor.classList.remove('click'));
    });
  }
})();

</script>
</body>
</html>
